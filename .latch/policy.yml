# .latch/policy.yml — Latch review policy for this repo.
# Generated by `latch init`, then hand-tuned for the Latch repo itself: the crude
# miner is fine for seeding a new repo, but we hold our own repo to a sharper bar.
# Latch reads it before every review (and the fixer reads `checks:`). See
# policy/examples/policy.yml for the fully documented reference, and
# doctrines/README.md for landmine packs.
version: 1

# Extra review rules appended to Latch's generic doctrine. Optional.
doctrine:
  - 'Treat every claim in the PR description as something to falsify, not to accept.'
  - 'Every new field, endpoint, event, or config key needs both a producer and a consumer.'

# Landmines: the Latch repo's own known traps — the "green CI but wrong" class.
# Hand-tuned for this repo; each is something the reviewer must actively HUNT for.
landmines:
  - id: template-fidelity
    summary: 'workflows/latch-*.yml carry production-proven event wiring; triggers, concurrency, bot/actor identities, and guards are load-bearing, not cosmetic.'
    hunt: 'Diff each changed workflow against master line by line; for every altered trigger, concurrency group, actor/identity gate, or guard condition demand an explicit line-by-line justification in the PR. Unexplained rewiring is blocking.'
    severity: blocking
  - id: zero-dependency-cli
    summary: 'The CLI must keep zero runtime dependencies — Node >= 18 stdlib only.'
    hunt: 'If this PR adds a "dependencies" entry to package.json, or a require() of any non-builtin module under cli/, that is a finding.'
    severity: blocking
  - id: self-contained-site
    summary: 'site/index.html must remain a single self-contained file: no external requests, CDNs, remote scripts, or web fonts.'
    hunt: 'Scan any diff to site/ for off-origin asset URLs, <script src>, <link rel=stylesheet href>, @import, @font-face, or fetch/XHR to a remote host. Any external request is blocking.'
    severity: blocking
  - id: anti-tamper-scope
    summary: 'Nothing may weaken the fixer safety envelope: its skip of .github/workflows/ and .latch/, the review⇄fix cycle cap, or the never-merges posture.'
    hunt: 'For any change to the workflow templates or fixer logic, confirm the path skip, the cycle cap, and the no-merge guarantee are still present and no weaker. Loosening any of them is blocking.'
    severity: blocking
  - id: honest-claims
    summary: 'README, site, and docs must not claim in present tense anything v0 does not ship; measurement and efficacy claims stay roadmap-framed.'
    hunt: 'For every new present-tense capability or metric claim in README/site/docs, verify the code ships it today; if it is aspirational it must read as roadmap. Overclaiming is a finding.'
    severity: warn

# Checks: this repo's real gate, keyed by a path glob. The review runs the ones
# matching a PR's changed paths; the fixer runs them after a change and keeps a
# fix only if they pass. A missing toolchain is reported, never faked.
checks:
  "**/*.js": 'npm test'
  "workflows/**": 'python3 -c "import yaml,sys; [yaml.safe_load(open(f)) for f in sys.argv[1:]]" workflows/latch-review.yml workflows/latch-fix.yml'

# Latch never merges. This records intent for humans reading the policy;
# the latch/merge-gate status is non-blocking until you mark it required.
merge_posture: converge-only
